name: MoonsideBar
options:
  bundleIdPrefix: studio.rabituza
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  minimumXcodeGenVersion: "2.40"

packages:
  MacControlCenterUI:
    url: https://github.com/orchetect/MacControlCenterUI
    from: "2.7.0"
  MenuBarExtraAccess:
    url: https://github.com/orchetect/MenuBarExtraAccess
    from: "1.3.0"
  Defaults:
    url: https://github.com/sindresorhus/Defaults
    from: "9.0.0"
  LaunchAtLogin-Modern:
    url: https://github.com/sindresorhus/LaunchAtLogin-Modern
    from: "1.0.0"

targets:
  MoonsideBar:
    type: application
    platform: macOS
    sources:
      - MoonsideBar
    settings:
      base:
        SWIFT_VERSION: "5.9"
        INFOPLIST_FILE: MoonsideBar/Info.plist
        CODE_SIGN_ENTITLEMENTS: MoonsideBar/MoonsideBar.entitlements
        GENERATE_INFOPLIST_FILE: false
        PRODUCT_NAME: MoonsideBar
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGN_ALLOW_ENTITLEMENTS_MODIFICATION: true
        ENABLE_HARDENED_RUNTIME: true
      configs:
        Debug:
          SWIFT_OPTIMIZATION_LEVEL: "-Onone"
        Release:
          SWIFT_OPTIMIZATION_LEVEL: "-O"
    dependencies:
      - package: MacControlCenterUI
      - package: MenuBarExtraAccess
      - package: Defaults
      - package: LaunchAtLogin-Modern
        product: LaunchAtLogin
    entitlements:
      path: MoonsideBar/MoonsideBar.entitlements
